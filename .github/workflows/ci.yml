name: Pipery Go CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/golang-ci@v1
        with:
          go_version: "1.22"
          tests_path: "./..."
          target_platforms: linux/amd64,linux/arm64,windows/amd64,darwin/amd64
          image_name: ghcr.io/${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_release: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          skip_reintegration: "true"

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/argocd-cd@v1
        with:
          validate_helm_chart: "true"
          app_name: pipery-release-bot
          chart_path: charts/pipery-release-bot
          skip_update: "true"
          skip_sync: "true"
          skip_status_check: "true"

  argocd-release:
    needs:
      - ci
      - helm
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish ArgoCD Helm chart update
        uses: pipery-dev/pipery-argocd-cd@v1
        with:
          publish_helm_chart_update: "true"
          argocd_repository: pipery-dev/argocd
          argocd_repository_token: ${{ secrets.PIPERY_ARGOCD_TOKEN }}
          app_name: pipery-release-bot
          app_namespace: pipery
          chart_path: charts/pipery-release-bot
          chart_target_revision: ${{ github.ref_name }}
          image_repository: ghcr.io/${{ github.repository }}
          image_tag: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          helm_values: |
            imagePullSecrets:
              - name: ghcr-pull-secret
          commit_user_name: pipery-release-bot
          commit_user_email: pipery-release-bot@users.noreply.github.com
