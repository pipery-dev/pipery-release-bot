name: Pipery Go CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/pipery-golang-ci@v1
        with:
          go_version: "1.22"
          tests_path: "./..."
          image_name: ghcr.io/${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_release: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          skip_reintegration: "true"

  argocd-release:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out bot source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check out ArgoCD repository
        uses: actions/checkout@v4
        with:
          repository: pipery-dev/pipery-argocd
          token: ${{ secrets.PIPERY_ARGOCD_TOKEN }}
          path: argocd

      - name: Publish ArgoCD Helm chart update
        env:
          APP_NAME: pipery-release-bot
          APP_NAMESPACE: pipery
          ARGOCD_REPO: argocd
          BOT_REPO_URL: https://github.com/pipery-dev/pipery-release-bot.git
          CHART_PATH: charts/pipery-release-bot
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_REF_TYPE: ${{ github.ref_type }}
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          image_tag="${GIT_REF_NAME}"
          if [ "${GIT_REF_TYPE}" != "tag" ]; then
            image_tag="${IMAGE_SHA}"
          fi

          app_dir="${ARGOCD_REPO}/applications/${APP_NAME}"
          mkdir -p "${app_dir}"

          cat > "${app_dir}/application.yaml" <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${APP_NAME}
            namespace: argocd
          spec:
            project: default
            sources:
              - repoURL: ${BOT_REPO_URL}
                targetRevision: ${GIT_REF_NAME}
                path: ${CHART_PATH}
                helm:
                  valueFiles:
                    - values.yaml
                    - \$values/applications/${APP_NAME}/values.yaml
              - repoURL: https://github.com/pipery-dev/pipery-argocd.git
                targetRevision: main
                ref: values
            destination:
              server: https://kubernetes.default.svc
              namespace: ${APP_NAMESPACE}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
          EOF

          cat > "${app_dir}/values.yaml" <<EOF
          image:
            repository: ${IMAGE_REPOSITORY}
            tag: ${image_tag}
          EOF

          cd "${ARGOCD_REPO}"
          git config user.name "pipery-release-bot"
          git config user.email "pipery-release-bot@users.noreply.github.com"
          git add "applications/${APP_NAME}"
          git diff --cached --quiet && exit 0
          git commit -m "Update ${APP_NAME} ArgoCD release to ${GIT_REF_NAME}"
          git push
