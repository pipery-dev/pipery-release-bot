name: Cross-Platform Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  cross-platform-release:
    uses: pipery-dev/pipery-tooling/.github/workflows/pipery-cross-platform-release.yml@main
    with:
      repo_name: pipery-release-bot
      go_target_platforms: linux/amd64,linux/arm64,windows/amd64,darwin/amd64
    secrets: inherit
