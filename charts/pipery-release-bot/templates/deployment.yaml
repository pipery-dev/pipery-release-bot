apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipery-release-bot.fullname" . }}
  labels:
    {{- include "pipery-release-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pipery-release-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pipery-release-bot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pipery-release-bot.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "pipery-release-bot.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PIPERY_RELEASE_CONFIG
              value: /etc/pipery/config/{{ .Values.config.secretKey }}
            {{- if or .Values.apiToken.existingSecret .Values.apiToken.value }}
            - name: PIPERY_RELEASE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipery-release-bot.apiTokenSecretName" . }}
                  key: {{ .Values.apiToken.secretKey }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/pipery/config
              readOnly: true
            {{- if or .Values.privateKey.existingSecret .Values.privateKey.value }}
            - name: private-key
              mountPath: /etc/pipery/private-key
              readOnly: true
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "pipery-release-bot.configSecretName" . }}
        {{- if or .Values.privateKey.existingSecret .Values.privateKey.value }}
        - name: private-key
          secret:
            secretName: {{ include "pipery-release-bot.privateKeySecretName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
